name: docs
on:
  push:
    branches:
      - develop
      - feature/*
      - main/*
      - bugfix/*
      - release/*
    paths:
      - docs/**
  pull_request_target:
    types: [issues, opened, reopened, synchronize]
    paths:
      - docs/**

jobs:

  documentation:

    permissions:
      pull-requests: "write"

    runs-on: ubuntu-latest
    name: Build and deploy documentation

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install (upgrade) python dependencies
      run: |
        pip install --upgrade pip
        pip install -r docs/requirements.txt

    - name: Install (upgrade) latex dependencies
      run: |
        sudo apt-get update
        # Install the full version
        # sudo apt-get install texlive-full -y
        # or only your required latex packages
        sudo apt-get install texlive-latex-base
        sudo apt-get install texlive-fonts-recommended texlive-fonts-extra
        sudo apt-get install texlive-latex-extra

    - name: Build documentation
      run: |
        cd docs
        make html
        make latexpdf

    - name: Upload documentation (on success)
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: ee-docs.pdf
        path: docs/_build/latex/ee-docs.pdf
        if-no-files-found: ignore

    - name: Upload warnings (on failure)
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: ee-docs.warnings.log
        path: docs/_build/warnings.log
        if-no-files-found: ignore

    - name: Comment ReadDocs Link in PR
      if: ${{ github.event_name == 'pull_request' }}
      uses: actions/github-script@v7
      with:
        script: |
          const message = `
          Link to ReadTheDocs sample build for this PR can be found at:
          https://eedocs.org.readthedocs.build/en/${{ github.event.pull_request.number }}
          `
          github.rest.issues.createComment({
           issue_number: context.issue.number,
           owner: context.repo.owner,
           repo: context.repo.repo,
           body: message
          })
